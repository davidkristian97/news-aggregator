services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DB_HOST: db
    command: >
      sh -c "php artisan package:discover --ansi &&
             php artisan migrate --force &&
             php artisan articles:fetch &&
             php artisan serve --host=0.0.0.0 --port=8000"
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    build: .
    env_file: .env
    environment:
      DB_HOST: db
    command: php artisan schedule:work
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-news_aggregator}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-secret}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  dbdata:
